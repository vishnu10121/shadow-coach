<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowCoach AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
        }

        /* LEFT SIDE - FORM */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            padding: 3rem;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #271fa4 0%, #3b82f6 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 15px rgba(39, 31, 164, 0.3);
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text h1 .shadow {
            background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
             background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text h1 .ai {
            color: #3b82f6;
        }

        .logo-text p {
            font-size: 11px;
            color: #3b82f6;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin-top: 4px;
        }

        .login-header {
            margin-bottom: 36px;
        }

        .login-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }

        .login-header p {
            color: #888;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #e0e0e0;
            font-weight: 600;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 18px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 14px;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #271fa4;
            box-shadow: 0 0 0 3px rgba(39, 31, 164, 0.2);
        }

        .form-group input::placeholder {
            color: #555;
            font-size: 15px;
        }

        .signin-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #271fa4 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 31, 164, 0.4);
        }

        .signup-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 28px;
            border-top: 1px solid #222;
            color: #888;
            font-size: 16px;
        }

        .signup-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            color: #ef4444;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        /* RIGHT SIDE - BRANDING */
        .brand-side {
            flex: 1;
            background: #271fa4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }

        .brand-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        .brand-content {
            position: relative;
            z-index: 1;
            max-width: 520px;
        }

        .brand-content h2 {
            font-size: 52px;
            font-weight: 800;
            color: white;
            margin-bottom: 24px;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .brand-content p {
            font-size: 20px;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 56px;
        }

        .company-logos {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .company-logo {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .company-logo:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .company-logo.google { color: #4285f4; }
        .company-logo.amazon { color: #ff9900; }
        .company-logo.microsoft { color: #00a4ef; }
        .company-logo.meta { color: #0064e1; }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }
            .brand-side {
                display: none;
            }
            .form-side {
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <!-- LEFT SIDE - LOGIN FORM -->
    <div class="form-side">
        <div class="login-container">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">
                    <h1>
                        <span class="shadow">ShadowCoach</span>
                        <span class="ai"> AI</span>
                    </h1>
                    <p>AI BLUE INTERVIEW COACH</p>
                </div>
            </div>
            
            <div class="login-header">
                <h2>Welcome back</h2>
                <p>Sign in to continue your interview preparation</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="signin-btn">Sign In →</button>
            </form>
            
            <div class="signup-link">
                Don't have an account? <a href="signup.html">Create account</a>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE - BRANDING -->
    <div class="brand-side">
        <div class="brand-content">
            <h2>Ace Your Next Interview</h2>
            <p>Practice with AI-powered mock interviews, get instant feedback, and land your dream job at top tech companies.</p>
            <div class="company-logos">
                <div class="company-logo google">G</div>
                <div class="company-logo amazon">A</div>
                <div class="company-logo microsoft">M</div>
                <div class="company-logo meta">M</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://shadowcoach-backend.onrender.com';
        const API_DEV = 'http://localhost:5000';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    credentials : 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Invalid credentials';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Server error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
