<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowCoach AI - Interview Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #0a0a0a; min-height: 100vh; }
        .dashboard { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px;
            background: #0f0f0f;
            border-right: 1px solid #1a1a1a;
            padding: 32px 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #271fa4 0%, #3b82f6 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: white; }
        .logo-text h2 { font-size: 20px; font-weight: 800; }
        .logo-text h2 .shadow { background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-text h2 .ai { color: #3b82f6; }
        .logo-text p { font-size: 9px; color: #3b82f6; letter-spacing: 1.5px; margin-top: 2px; }
        
        .nav-menu { list-style: none; margin-top: 8px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; margin: 4px 0; border-radius: 12px; cursor: pointer; transition: all 0.3s; color: #888; font-weight: 500; }
        .nav-item svg { width: 22px; height: 22px; stroke: #888; stroke-width: 1.5; fill: none; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: white; }
        .nav-item:hover svg, .nav-item.active svg { stroke: #3b82f6; }
        
        .user-section { position: absolute; bottom: 32px; left: 24px; right: 24px; padding: 16px; background: #1a1a1a; border-radius: 16px; display: flex; align-items: center; gap: 12px; border: 1px solid #2a2a2a; }
        .user-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #271fa4 0%, #3b82f6 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: white; }
        .user-info { flex: 1; }
        .user-name { font-weight: 700; color: white; font-size: 16px; }
        .logout-btn { font-size: 13px; color: #888; cursor: pointer; }
        .logout-btn:hover { color: #ef4444; }
        
        .main-content { flex: 1; margin-left: 280px; padding: 32px 48px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 32px; font-weight: 700; color: white; margin-bottom: 8px; }
        .page-header p { color: #888; }
        
        .company-grid { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .company-card { background: #1a1a1a; border: 2px solid transparent; border-radius: 16px; padding: 16px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.3s; }
        .company-card.selected { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
        .company-icon { width: 44px; height: 44px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .company-name { font-weight: 600; color: white; font-size: 16px; }
        .difficulty-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .mode-section { margin-bottom: 24px; }
        .mode-buttons { display: flex; gap: 16px; }
        .mode-btn { flex: 1; padding: 14px; background: #1a1a1a; border: 2px solid transparent; border-radius: 16px; color: #888; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .mode-btn.active { border-color: #3b82f6; background: rgba(59,130,246,0.1); color: #3b82f6; }
        
        .role-section { margin-bottom: 24px; }
        .role-buttons { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
        .role-btn { padding: 12px 24px; background: #1a1a1a; border: 2px solid transparent; border-radius: 12px; color: #888; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .role-btn.selected { border-color: #3b82f6; background: rgba(59,130,246,0.1); color: #3b82f6; }
        
        .start-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #271fa4, #3b82f6); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: all 0.3s; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59,130,246,0.3); }
        
        .coding-section, .hr-section { display: none; }
        .coding-section.active, .hr-section.active { display: block; }
        
        .question-card { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 24px; padding: 32px; margin-top: 24px; }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #2a2a2a; }
        .company-badge { display: flex; align-items: center; gap: 12px; }
        .company-icon-small { width: 40px; height: 40px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .question-count { color: #888; font-size: 14px; }
        .question-title { font-size: 24px; font-weight: 700; color: white; margin-bottom: 12px; }
        .difficulty { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; }
        .difficulty-easy { background: rgba(16,185,129,0.2); color: #10b981; }
        .difficulty-medium { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .difficulty-hard { background: rgba(239,68,68,0.2); color: #ef4444; }
        .question-desc { color: #cbd5e1; line-height: 1.6; margin-bottom: 24px; }
        .example-box { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
        .example-title { color: #3b82f6; margin-bottom: 8px; font-weight: 600; }
        .example-text { font-family: monospace; color: #94a3b8; font-size: 13px; white-space: pre-wrap; }
        
        .code-editor { background: #1e1e1e; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #2a2a2a; }
        .run-btn { background: #3b82f6; border: none; padding: 8px 20px; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .run-btn:hover { background: #2563eb; }
        .code-input { width: 100%; min-height: 400px; padding: 20px; background: #1e1e1e; border: none; color: #d4d4d4; font-family: 'Courier New', monospace; font-size: 14px; resize: vertical; outline: none; line-height: 1.5; }
        
        .output-area { background: #0f0f0f; border-radius: 12px; padding: 16px; margin-top: 20px; }
        .output-title { color: #3b82f6; margin-bottom: 12px; font-weight: 600; }
        .output-content { background: #1a1a1a; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; color: #cbd5e1; white-space: pre-wrap; max-height: 250px; overflow-y: auto; }
        
        .hr-question-text { font-size: 22px; font-weight: 600; color: white; line-height: 1.4; margin-bottom: 24px; }
        .answer-input { width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; font-size: 16px; color: white; font-family: inherit; resize: vertical; min-height: 180px; margin-bottom: 20px; }
        .answer-input:focus { outline: none; border-color: #3b82f6; }
        .feedback-area { background: #1a1a1a; border-radius: 16px; padding: 20px; margin-bottom: 24px; display: none; }
        .feedback-title { color: #3b82f6; margin-bottom: 8px; font-weight: 600; }
        .feedback-text { color: #cbd5e1; font-size: 14px; line-height: 1.5; }
        .next-btn { padding: 12px 28px; background: linear-gradient(135deg, #271fa4, #3b82f6); border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; margin-top: 20px; transition: all 0.3s; }
        .next-btn:hover { transform: translateY(-2px); }
        
        @media (max-width: 768px) { .sidebar { width: 80px; padding: 24px 16px; } .logo-text, .nav-item span { display: none; } .main-content { margin-left: 80px; padding: 24px; } .company-grid { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="logo"><div class="logo-icon">⚡</div><div class="logo-text"><h2><span class="shadow">ShadowCoach</span><span class="ai"> AI</span></h2><p>YOUR INTERVIEW COACH</p></div></div>
            <ul class="nav-menu">
                <li class="nav-item" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H4a2 2 0 0 1-2-2z"/></svg><span>Dashboard</span></li>
                <li class="nav-item" onclick="location.href='resume-checker.html'"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Resume</span></li>
                <li class="nav-item active"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Interview</span></li>
                <li class="nav-item" onclick="location.href='prep-kit.html'"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>Prep Kit</span></li>
                <li class="nav-item" onclick="location.href='history.html'"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M12 8v4l3 3M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/></svg><span>History</span></li>
            </ul>
            <div class="user-section"><div class="user-avatar" id="userAvatar">V</div><div class="user-info"><div class="user-name" id="userName">vishnu</div><div class="logout-btn" onclick="logout()">Logout</div></div></div>
        </div>

        <div class="main-content">
            <div class="page-header"><h1><i class="fas fa-microphone-alt"></i> Interview Practice</h1><p>Select company, mode, and role to begin your preparation</p></div>
            
            <div id="setupPanel">
                <div class="company-grid" id="companyGrid"></div>
                
                <div class="mode-section">
                    <h3 style="color:white; margin-bottom:12px;">Select Mode</h3>
                    <div class="mode-buttons">
                        <button class="mode-btn" id="codingModeBtn" onclick="selectMode('coding')"><i class="fas fa-code"></i> Coding Interview</button>
                        <button class="mode-btn" id="hrModeBtn" onclick="selectMode('hr')"><i class="fas fa-user-tie"></i> HR Interview</button>
                    </div>
                </div>
                
                <div class="role-section">
                    <h3 style="color:white; margin-bottom:12px;">Select Your Role</h3>
                    <div class="role-buttons" id="roleButtons"></div>
                </div>
                
                <button class="start-btn" id="startBtn" onclick="startInterview()">Start Interview →</button>
            </div>

            <div id="codingSection" class="coding-section"></div>
            <div id="hrSection" class="hr-section"></div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';
        document.getElementById('userName').innerHTML = user.name || 'vishnu';
        document.getElementById('userAvatar').innerHTML = (user.name || 'V').charAt(0).toUpperCase();
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        const companies = [
            { name: 'Google', icon: 'fab fa-google', color: '#4285f4', difficulty: 'Hard' },
            { name: 'Amazon', icon: 'fab fa-amazon', color: '#ff9900', difficulty: 'Hard' },
            { name: 'Microsoft', icon: 'fab fa-microsoft', color: '#00a4ef', difficulty: 'Medium' },
            { name: 'Meta', icon: 'fab fa-facebook-f', color: '#0064e1', difficulty: 'Hard' },
            { name: 'Apple', icon: 'fab fa-apple', color: '#000', difficulty: 'Hard' },
            { name: 'Netflix', icon: 'fas fa-tv', color: '#e50914', difficulty: 'Very Hard' }
        ];

        // Role-specific coding questions with expected output and validation
        const codingQuestions = {
            'Software Engineer': {
                Google: { 
                    title: "Two Sum", 
                    difficulty: "Hard", 
                    desc: "Given an array of integers nums and an integer target, return indices of the two numbers that add up to target.",
                    example: "Input: nums = [2,7,11,15], target = 9\nOutput: [0,1]",
                    expectedOutput: "[0,1]",
                    validateCode: function(code) {
                        // Check if code contains proper logic
                        if(!code.includes('unordered_map') && !code.includes('map')) return false;
                        if(!code.includes('complement')) return false;
                        if(!code.includes('return')) return false;
                        return true;
                    }
                }
            },
            'Data Scientist': {
                Google: { 
                    title: "Moving Average", 
                    difficulty: "Medium", 
                    desc: "Calculate moving average from data stream with given window size.",
                    example: "Input: size=3, values: 1,2,3,4\nOutput: 1, 1.5, 2, 3",
                    expectedOutput: "1 1.5 2 3",
                    validateCode: function(code) {
                        if(!code.includes('queue')) return false;
                        if(!code.includes('sum')) return false;
                        if(!code.includes('next')) return false;
                        return true;
                    }
                }
            },
            'Full Stack Developer': {
                Google: { 
                    title: "Valid Palindrome", 
                    difficulty: "Medium", 
                    desc: "Check if a string is a palindrome (reads the same forward and backward).",
                    example: "Input: 'racecar'\nOutput: true",
                    expectedOutput: "true",
                    validateCode: function(code) {
                        if(!code.includes('reverse') && !code.includes('two pointers') && !code.includes('l<r')) {
                            // Check if has palindrome logic
                            if(code.includes('s[i]') && code.includes('s[s.length()-1-i]')) return true;
                            if(code.includes('l++') && code.includes('r--')) return true;
                        }
                        return true;
                    }
                }
            }
        };

        const hrQuestions = {
            'Software Engineer': {
                Google: ["Tell me about yourself and why you want to work at Google.","Describe a challenging technical project you worked on.","How do you stay updated with latest technologies?"]
            },
            'Data Scientist': {
                Google: ["Tell me about yourself and why you want to work at Google as a Data Scientist.","Describe a machine learning project you worked on.","How do you handle imbalanced datasets?"]
            },
            'Full Stack Developer': {
                Google: ["Tell me about yourself and your full stack experience.","Describe a full-stack project you built from scratch.","How do you balance frontend and backend development?"]
            }
        };

        let selectedCompany = null;
        let selectedCompanyIcon = null;
        let selectedCompanyColor = null;
        let selectedMode = 'coding';
        let selectedRole = null;
        let currentQuestion = null;
        let hrQuestionList = [];
        let hrIndex = 0;
        let hrAnswers = [];

        function renderCompanies() {
            const container = document.getElementById('companyGrid');
            container.innerHTML = companies.map(c => `
                <div class="company-card" onclick="selectCompany('${c.name}', '${c.icon}', '${c.color}')" data-company="${c.name}">
                    <div class="company-icon" style="color:${c.color};"><i class="${c.icon} fa-2x"></i></div>
                    <span class="company-name">${c.name}</span>
                    <span class="difficulty-badge">${c.difficulty}</span>
                </div>
            `).join('');
        }

        function selectCompany(name, icon, color) {
            selectedCompany = name;
            selectedCompanyIcon = icon;
            selectedCompanyColor = color;
            document.querySelectorAll('.company-card').forEach(card => card.classList.remove('selected'));
            document.querySelector(`.company-card[data-company="${name}"]`).classList.add('selected');
        }

        function renderRoles() {
            const container = document.getElementById('roleButtons');
            const roles = ['Software Engineer', 'Data Scientist', 'Full Stack Developer'];
            container.innerHTML = roles.map(r => `<button class="role-btn" onclick="selectRole('${r}')">${r}</button>`).join('');
        }

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function selectMode(mode) {
            selectedMode = mode;
            document.getElementById('codingModeBtn').classList.remove('active');
            document.getElementById('hrModeBtn').classList.remove('active');
            if(mode === 'coding') document.getElementById('codingModeBtn').classList.add('active');
            else document.getElementById('hrModeBtn').classList.add('active');
        }

        function startInterview() {
            if(!selectedCompany) { alert('Please select a company'); return; }
            if(!selectedRole) { alert('Please select your role'); return; }
            
            document.getElementById('setupPanel').style.display = 'none';
            
            if(selectedMode === 'coding') {
                startCodingInterview();
            } else {
                startHrInterview();
            }
        }

        function getFullCodeTemplate(title, userCode) {
            if(title === "Moving Average") {
                return `#include <iostream>\n#include <queue>\nusing namespace std;\n\n${userCode}\n\nint main() {\n    MovingAverage ma(3);\n    cout << ma.next(1) << " " << ma.next(2) << " " << ma.next(3) << " " << ma.next(4) << endl;\n    return 0;\n}`;
            } else if(title === "Two Sum") {
                return `#include <iostream>\n#include <vector>\n#include <unordered_map>\nusing namespace std;\n\n${userCode}\n\nint main() {\n    vector<int> nums = {2,7,11,15};\n    int target = 9;\n    vector<int> result = twoSum(nums, target);\n    if(!result.empty()) {\n        cout << "[" << result[0] << "," << result[1] << "]";\n    }\n    return 0;\n}`;
            } else if(title === "Valid Palindrome") {
                return `#include <iostream>\n#include <string>\n#include <algorithm>\n#include <cctype>\nusing namespace std;\n\n${userCode}\n\nint main() {\n    string s = "racecar";\n    cout << (isPalindrome(s) ? "true" : "false") << endl;\n    return 0;\n}`;
            }
            return userCode;
        }

        function validateCodeOutput(code, expectedOutput, title) {
            // Intelligent code validation
            let score = 0;
            let feedback = "";
            
            // Check for syntax completeness
            if(!code.includes('#include')) { feedback = "Missing #include directives"; return {score:30, feedback}; }
            if(!code.includes('int main') && title !== "Moving Average") { feedback = "Missing main function structure"; return {score:30, feedback}; }
            
            // Title-specific logic validation
            if(title === "Two Sum") {
                if(code.includes('unordered_map') || code.includes('map')) score += 30;
                if(code.includes('complement')) score += 20;
                if(code.includes('return')) score += 20;
                if(code.includes('for')) score += 20;
                if(code.toLowerCase().includes('target - nums[i]')) score += 10;
                
                if(score >= 80) feedback = "✅ Excellent! Your Two Sum implementation is correct.";
                else if(score >= 60) feedback = "⚠️ Good attempt! Your logic is mostly correct but missing some key elements like unordered_map.";
                else feedback = "❌ Your solution needs work. Use a hash map for O(n) time complexity.";
                
            } else if(title === "Moving Average") {
                if(code.includes('queue')) score += 30;
                if(code.includes('sum')) score += 25;
                if(code.includes('next')) score += 25;
                if(code.includes('size')) score += 20;
                
                if(score >= 80) feedback = "✅ Perfect! Your Moving Average implementation handles the sliding window correctly.";
                else if(score >= 60) feedback = "⚠️ Almost there! Make sure to maintain sum and use queue for sliding window.";
                else feedback = "❌ Your implementation needs work. Use a queue and maintain running sum.";
                
            } else if(title === "Valid Palindrome") {
                if(code.includes('two pointers') || (code.includes('l<r') && (code.includes('l++') || code.includes('r--')))) score += 40;
                if(code.includes('tolower') || code.includes('toupper')) score += 30;
                if(code.includes('isalnum')) score += 30;
                
                if(score >= 80) feedback = "✅ Great! Your palindrome checker handles the logic correctly.";
                else if(score >= 60) feedback = "⚠️ Good start! Make sure to ignore non-alphanumeric characters and case.";
                else feedback = "❌ Your solution needs work. Use two pointers from both ends.";
            }
            
            return {score: Math.min(95, score + 20), feedback};
        }

        function startCodingInterview() {
            currentQuestion = codingQuestions[selectedRole]?.[selectedCompany];
            if(!currentQuestion) {
                alert('Coding questions not available');
                return;
            }
            
            document.getElementById('codingSection').classList.add('active');
            document.getElementById('hrSection').classList.remove('active');
            loadCodingQuestion();
        }

        function loadCodingQuestion() {
            const container = document.getElementById('codingSection');
            const q = currentQuestion;
            
            const defaultCode = q.title === "Two Sum" ? 
`vector<int> twoSum(vector<int>& nums, int target) {
    unordered_map<int, int> map;
    for(int i = 0; i < nums.size(); i++) {
        int complement = target - nums[i];
        if(map.find(complement) != map.end()) {
            return {map[complement], i};
        }
        map[nums[i]] = i;
    }
    return {};
}` : (q.title === "Moving Average" ?
`class MovingAverage {
    queue<int> q;
    int size;
    double sum = 0;
public:
    MovingAverage(int s) : size(s) {}
    
    double next(int val) {
        if(q.size() == size) {
            sum -= q.front();
            q.pop();
        }
        q.push(val);
        sum += val;
        return sum / q.size();
    }
}` :
`bool isPalindrome(string s) {
    int l = 0, r = s.length() - 1;
    while(l < r) {
        if(s[l] != s[r]) return false;
        l++;
        r--;
    }
    return true;
}`);
            
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="company-badge">
                            <div class="company-icon-small" style="color:${selectedCompanyColor};"><i class="${selectedCompanyIcon} fa-lg"></i></div>
                            <span style="font-weight:600; color:white;">${selectedCompany} • ${selectedRole}</span>
                        </div>
                        <div class="question-count">Coding Challenge</div>
                    </div>
                    <div class="question-title">${q.title}</div>
                    <span class="difficulty difficulty-${q.difficulty.toLowerCase()}">${q.difficulty}</span>
                    <div class="question-desc">${q.desc}</div>
                    <div class="example-box">
                        <div class="example-title"><i class="fas fa-lightbulb"></i> Example:</div>
                        <div class="example-text">${q.example}</div>
                    </div>
                    <div class="code-editor">
                        <div class="editor-header">
                            <span><i class="fas fa-code"></i> C++ Code (Implement your solution below)</span>
                            <button class="run-btn" onclick="compileAndRun()"><i class="fas fa-play"></i> Run & Validate</button>
                        </div>
                        <textarea id="codeInput" class="code-input" spellcheck="false">${defaultCode}</textarea>
                    </div>
                    <div class="output-area" id="outputArea" style="display:none;">
                        <div class="output-title"><i class="fas fa-terminal"></i> Result:</div>
                        <div class="output-content" id="outputContent"></div>
                    </div>
                    <button class="next-btn" onclick="submitCoding()">Submit & Complete →</button>
                </div>
            `;
        }

        function compileAndRun() {
            const code = document.getElementById('codeInput').value;
            const q = currentQuestion;
            const outputDiv = document.getElementById('outputArea');
            const outputContent = document.getElementById('outputContent');
            
            outputDiv.style.display = 'block';
            outputContent.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validating your code...';
            
            setTimeout(() => {
                const result = validateCodeOutput(code, q.expectedOutput, q.title);
                outputContent.innerHTML = result.feedback;
                window.validatedScore = result.score;
            }, 1000);
        }

        function submitCoding() {
            let score = window.validatedScore || 75;
            
            let stats = JSON.parse(localStorage.getItem('stats') || '{}');
            stats.totalInterviews = (stats.totalInterviews || 0) + 1;
            stats.completed = (stats.completed || 0) + 1;
            stats.avgScore = Math.round(((stats.avgScore || 0) * (stats.completed - 1) + score) / stats.completed);
            localStorage.setItem('stats', JSON.stringify(stats));
            
            document.getElementById('codingSection').innerHTML = `
                <div class="question-card" style="text-align:center;">
                    <div style="font-size:64px; margin-bottom:20px;">🎉</div>
                    <div style="font-size:48px; font-weight:800; color:#3b82f6; margin-bottom:16px;">${Math.round(score)}%</div>
                    <div style="font-size:20px; color:white; margin-bottom:24px;">Coding Interview Complete!</div>
                    <div style="background:#1a1a1a; border-radius:16px; padding:20px; margin-bottom:24px; text-align:left;">
                        <strong style="color:#3b82f6;">📊 Final Feedback:</strong><br>
                        ${score >= 85 ? 'Excellent! Your solution correctly implements the required logic.' : score >= 70 ? 'Good attempt! Your solution has the right approach but can be optimized.' : 'Review the problem requirements and try implementing the key logic again.'}
                    </div>
                    <button onclick="resetInterview()" style="background:#3b82f6; border:none; padding:14px 32px; border-radius:40px; color:white; font-weight:600; cursor:pointer;">Practice Again →</button>
                </div>
            `;
        }

        function startHrInterview() {
            hrQuestionList = hrQuestions[selectedRole]?.[selectedCompany];
            if(!hrQuestionList) {
                alert('HR questions not available');
                return;
            }
            hrIndex = 0;
            hrAnswers = [];
            document.getElementById('hrSection').classList.add('active');
            document.getElementById('codingSection').classList.remove('active');
            loadHrQuestion();
        }

        function loadHrQuestion() {
            const container = document.getElementById('hrSection');
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="company-badge">
                            <div class="company-icon-small" style="color:${selectedCompanyColor};"><i class="${selectedCompanyIcon} fa-lg"></i></div>
                            <span style="font-weight:600; color:white;">${selectedCompany} • ${selectedRole}</span>
                        </div>
                        <div class="question-count">Question ${hrIndex+1} of ${hrQuestionList.length}</div>
                    </div>
                    <div class="hr-question-text">${hrQuestionList[hrIndex]}</div>
                    <textarea class="answer-input" id="answerInput" rows="6" placeholder="Type your answer here... Use STAR method (Situation, Task, Action, Result)"></textarea>
                    <div class="feedback-area" id="feedbackArea">
                        <div class="feedback-title"><i class="fas fa-robot"></i> AI Feedback</div>
                        <div class="feedback-text" id="feedbackText"></div>
                    </div>
                    <button class="next-btn" onclick="submitHrAnswer()">${hrIndex === hrQuestionList.length-1 ? 'Complete Interview →' : 'Next Question →'}</button>
                </div>
            `;
        }

        function submitHrAnswer() {
            const answer = document.getElementById('answerInput').value.trim();
            if(!answer) { alert('Please provide an answer'); return; }
            
            let score = 60;
            const hasStar = answer.toLowerCase().includes('situation') || answer.toLowerCase().includes('task') || answer.toLowerCase().includes('action') || answer.toLowerCase().includes('result');
            if(hasStar) score += 25;
            if(answer.length > 150) score += 15;
            score = Math.min(100, score);
            
            hrAnswers.push({ score: score });
            
            document.getElementById('feedbackText').innerHTML = `<strong>Score: ${score}%</strong><br><br>${score >= 85 ? 'Excellent answer! Great structure and details.' : score >= 70 ? 'Good answer! Add more specific metrics and examples.' : 'Use STAR method for better structure and add specific examples.'}`;
            document.getElementById('feedbackArea').style.display = 'block';
            document.querySelector('.next-btn').disabled = true;
            
            hrIndex++;
            if(hrIndex < hrQuestionList.length) {
                setTimeout(() => loadHrQuestion(), 2000);
            } else {
                setTimeout(() => completeHrInterview(), 1500);
            }
        }

        function completeHrInterview() {
            const totalScore = hrAnswers.reduce((sum, a) => sum + a.score, 0) / hrAnswers.length;
            let stats = JSON.parse(localStorage.getItem('stats') || '{}');
            stats.totalInterviews = (stats.totalInterviews || 0) + 1;
            stats.completed = (stats.completed || 0) + 1;
            stats.avgScore = Math.round(((stats.avgScore || 0) * (stats.completed - 1) + totalScore) / stats.completed);
            localStorage.setItem('stats', JSON.stringify(stats));
            
            document.getElementById('hrSection').innerHTML = `
                <div class="question-card" style="text-align:center;">
                    <div style="font-size:64px; margin-bottom:20px;">🎉</div>
                    <div style="font-size:48px; font-weight:800; color:#3b82f6; margin-bottom:16px;">${Math.round(totalScore)}%</div>
                    <div style="font-size:20px; color:white; margin-bottom:24px;">HR Interview Complete!</div>
                    <button onclick="resetInterview()" style="background:#3b82f6; border:none; padding:14px 32px; border-radius:40px; color:white; font-weight:600; cursor:pointer;">Practice Again →</button>
                </div>
            `;
        }

        function resetInterview() {
            selectedCompany = null;
            selectedRole = null;
            document.getElementById('setupPanel').style.display = 'block';
            document.getElementById('codingSection').classList.remove('active');
            document.getElementById('hrSection').classList.remove('active');
            document.querySelectorAll('.company-card').forEach(card => card.classList.remove('selected'));
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('codingModeBtn').classList.add('active');
            document.getElementById('hrModeBtn').classList.remove('active');
            selectedMode = 'coding';
        }

        renderCompanies();
        renderRoles();
    </script>
</body>
</html>
