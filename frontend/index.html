<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowCoach AI - Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .api-response {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 ShadowCoach AI</h1>
        <p class="subtitle">Your Personal Interview Coach</p>
        
        <div class="status-card">
            <strong>📡 Backend Status:</strong>
            <div id="backendStatus" class="status">Checking...</div>
        </div>
        
        <div>
            <button onclick="testAPI()">Test API</button>
            <button onclick="testSupabase()">Test Supabase</button>
        </div>
        
        <div id="apiResponse" class="api-response" style="display:none;">
            Response will appear here...
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000'; // Change to your Render URL later
        
        // Check backend on load
        async function checkBackend() {
            const statusDiv = document.getElementById('backendStatus');
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                statusDiv.innerHTML = `✅ Online - ${data.message}`;
                statusDiv.className = 'status success';
            } catch (error) {
                statusDiv.innerHTML = `❌ Offline - Make sure backend is running on ${API_URL}`;
                statusDiv.className = 'status error';
                console.error('Backend error:', error);
            }
        }
        
        async function testAPI() {
            const responseDiv = document.getElementById('apiResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> Loading...';
            
            try {
                const response = await fetch(`${API_URL}/api/test`);
                const data = await response.json();
                responseDiv.innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                responseDiv.innerHTML = `Error: ${error.message}`;
                responseDiv.style.background = '#f8d7da';
                responseDiv.style.color = '#721c24';
            }
        }
        
        async function testSupabase() {
            const responseDiv = document.getElementById('apiResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> Testing Supabase...';
            
            try {
                const response = await fetch(`${API_URL}/api/supabase-test`);
                const data = await response.json();
                responseDiv.innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                responseDiv.innerHTML = `Error: ${error.message}`;
            }
        }
        
        // Run on page load
        checkBackend();
    </script>
</body>
</html>
